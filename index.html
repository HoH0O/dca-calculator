<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>미국 주식 DCA 계산기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.4/babel.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="root">
    <div class="init-loader">
      <div class="init-spinner"></div>
      <p>로딩 중...</p>
    </div>
  </div>

  <script>
    (function () {
      function showError(msg) {
        document.getElementById('root').innerHTML =
          '<div style="color:#f87171;padding:40px;font-family:monospace;font-size:13px;line-height:1.6">' +
          '<strong style="font-size:15px">앱 로드 오류</strong><br><br>' + msg + '</div>';
      }

      function boot() {
        if (typeof Babel    === 'undefined') return showError('Babel 로드 실패 — CDN 접속을 확인하세요.');
        if (typeof React    === 'undefined') return showError('React 로드 실패');
        if (typeof ReactDOM === 'undefined') return showError('ReactDOM 로드 실패');
        if (typeof Recharts === 'undefined') return showError('Recharts 로드 실패');

        fetch('main.js')
          .then(function (r) {
            if (!r.ok) throw new Error('main.js 요청 실패: HTTP ' + r.status);
            return r.text();
          })
          .then(function (code) {
            var transformed = Babel.transform(code, {
              presets: ['react'],
              filename: 'main.js'
            }).code;
            var s = document.createElement('script');
            s.type = 'text/javascript';
            s.text = transformed;
            document.body.appendChild(s);
          })
          .catch(function (err) {
            showError(err.message + '<br><br>브라우저 콘솔(F12)에서 상세 오류를 확인하세요.');
            console.error('[DCA] 앱 로드 실패:', err);
          });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot);
      } else {
        boot();
      }
    })();
  </script>
</body>
</html>
